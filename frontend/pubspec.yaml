name: aac_app
description: Aplikasi AAC (Augmentative and Alternative Communication) —
  papan simbol dengan text-to-speech Bahasa Indonesia.
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Text-to-speech via engine native (offline).
  flutter_tts: ^4.2.0

  # Database lokal (SQLite) — offline-first.
  drift: ^2.20.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.4

  # State management ringan.
  provider: ^6.1.2

  uuid: ^4.5.0

  # Editor papan (Fase 5): foto custom + render simbol SVG (Mulberry).
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10

  # Sync & akun (Fase 6).
  http: ^1.2.2
  shared_preferences: ^2.3.2
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Codegen untuk drift.
  drift_dev: ^2.20.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true

  assets:
    # Subset Mulberry Symbols (CC BY-SA 2.0 UK) — lihat
    # assets/symbols/mulberry/ATTRIBUTION.md
    - assets/symbols/mulberry/
