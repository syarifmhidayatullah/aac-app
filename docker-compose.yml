services:
  postgres:
    image: postgres:16-alpine
    container_name: aac_postgres
    environment:
      POSTGRES_USER: aac
      POSTGRES_PASSWORD: aac_dev_password
      POSTGRES_DB: aac
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aac"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
